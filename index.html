<script>

let ip = "Detecting...";

fetch("https://api.ipify.org?format=json")
.then(res=>res.json())
.then(data=>{

let text =
`ACCESSING GLOBAL NETWORK...

Scanning files...
Accessing system storage...

Collecting encrypted data...

GLOBAL CYBER MONITORING ACTIVE

If you need secure communication
Contact Samsoor Cyber Terminal

let i = 0;

function type(){

if(i < text.length){

document.getElementById("terminal").innerHTML += text.charAt(i);
i++;

setTimeout(type,40);

}

}

window.onload = function(){

let audio = document.getElementById("sound");

/* MATRIX EFFECT */

let canvas = document.getElementById("matrix");
let ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width/fontSize;

let drops = [];

for(let x = 0; x < columns; x++)
drops[x] = 1;

function draw(){

ctx.fillStyle = "rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = "#0F0";
ctx.font = fontSize + "px monospace";

for(let i = 0; i < drops.length; i++){

let text = letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize > canvas.height && Math.random() > 0.975)
drops[i] = 0;

drops[i]++;

}

}

setInterval(draw,33);

</script>
