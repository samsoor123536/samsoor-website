<!DOCTYPE html>
<html>
<head>
<title>Samsoor Cyber Terminal</title>

<style>
body{
background:black;
color:#00ff00;
font-family:monospace;
margin:0;
padding:20px;
}

#terminal{
font-size:18px;
margin-bottom:20px;
}

button{
background:#00ff00;
color:black;
border:none;
padding:10px 20px;
font-weight:bold;
font-family:monospace;
cursor:pointer;
}
</style>
</head>

<body>

<div id="terminal"></div>

<button onclick="startSystem()">START SYSTEM</button>

<audio id="sound">
<source src="https://www.soundjay.com/mechanical/keyboard-typing-1.mp3" type="audio/mpeg">
</audio>

<script>

let lines = [
"ACCESSING SYSTEM...",
"LOADING MODULES...",
"SCANNING NETWORK...",
"BYPASSING FIREWALL...",
"ACCESS GRANTED...",
"",
"WELCOME TO SAMSOOR CYBER TERMINAL",
"Owner: Samsoor",
"Security Level: MAXIMUM",
"Status: ONLINE",
"",
"Connecting to secure network...",
"Decrypting files...",
"System ready..."
];

let index = 0;

function startSystem(){

document.getElementById("sound").play();

function showLine(){

if(index < lines.length){

document.getElementById("terminal").innerHTML += lines[index] + "<br>";

index++;

setTimeout(showLine,700);

}

}

showLine();

}

</script>

</body>
</html>
<script>
setTimeout(function(){
document.body.innerHTML += "<br>TEST MESSAGE WORKING";
},2000);
</script>
