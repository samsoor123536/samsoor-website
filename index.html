<script>

let text =
`ACCESSING SYSTEM...
LOADING MODULES...
SCANNING NETWORK...
BYPASSING FIREWALL...
ACCESS GRANTED...

WELCOME TO SAMSOOR CYBER TERMINAL
Owner: Samsoor
Security Level: MAXIMUM
Status: ONLINE

Connecting to secure network...
Decrypting files...
System ready...
Scanning devices...
Collecting data...
Tracking IP address...
Uploading report...
Process complete...

System monitoring active...
Connection secured...
Waiting for command...`;

let i = 0;

function startSystem(){

let audio = document.getElementById("sound");
audio.play();

function type(){

if(i < text.length){

document.getElementById("terminal").innerHTML += text.charAt(i);
i++;

setTimeout(type,40);

}

}

type();

}

</script>
