<!DOCTYPE html><html>
<head>
<title>Samsoor Cyber Terminal</title><style>
body{
background:black;
color:#00ff00;
font-family:monospace;
padding:20px;
}

#terminal{
font-size:18px;
white-space:pre-line;
}

button{
background:#00ff00;
color:black;
border:none;
padding:10px 20px;
font-weight:bold;
cursor:pointer;
}
</style></head><body><div id="terminal"></div><button onclick="startSystem()">START SYSTEM</button>

<audio id="sound" loop>
<source src="https://www.soundjay.com/mechanical/keyboard-typing-1.mp3" type="audio/mpeg">
</audio><script>

let text =
`ACCESSING SYSTEM...
LOADING MODULES...
SCANNING NETWORK...
BYPASSING FIREWALL...
ACCESS GRANTED...

WELCOME TO SAMSOOR CYBER TERMINAL
Owner: Samsoor
Security Level: MAXIMUM
Status: ONLINE

Connecting to secure network...
Decrypting files...
System ready...
Scanning devices...
Collecting data...
Tracking IP address...
Uploading report...
Process complete...`;

let i = 0;

function startSystem(){

let audio = document.getElementById("sound");
audio.play();

function type(){

if(i < text.length){

document.getElementById("terminal").innerHTML += text.charAt(i);
i++;

setTimeout(type,40);

}else{

audio.pause();

}

}

type();

}

</script></body>
</html>
