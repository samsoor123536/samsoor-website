<!DOCTYPE html>
<html>
<head>
<title>Samsoor Cyber Terminal</title>

<style>
body{
background:black;
color:#00ff00;
font-family:monospace;
margin:0;
overflow:hidden;
}

#terminal{
padding:20px;
font-size:18px;
}

button{
background:#00ff00;
border:none;
padding:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div id="terminal"></div>

<button onclick="startHack()">START SYSTEM</button>

<audio id="sound" loop>
<source src="https://www.soundjay.com/mechanical/keyboard-typing-1.mp3" type="audio/mpeg">
</audio>

<script>

var lines=[
"ACCESSING SYSTEM...",
"LOADING MODULES...",
"SCANNING NETWORK...",
"BYPASSING FIREWALL...",
"ACCESS GRANTED",
"",
"WELCOME TO SAMSOOR CYBER TERMINAL",
"Owner: Samsoor",
"Security Level: MAXIMUM",
"Status: ONLINE"
];

var i=0;

function startHack(){

document.getElementById("sound").play();

var terminal=document.getElementById("terminal");

function typeLine(){
if(i<lines.length){
terminal.innerHTML+=lines[i]+"<br>";
i++;
setTimeout(typeLine,800);
}
}

typeLine();
}

</script>

</body>
</html>
