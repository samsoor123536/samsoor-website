<!DOCTYPE html>
<html>
<head>
<title>Samsoor Cyber Terminal</title>

<style>
body{
background:black;
color:#00ff00;
font-family:monospace;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

#text{
padding:20px;
font-size:18px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="text">
ACCESSING SYSTEM...<br>
LOADING MODULES...<br>
SCANNING NETWORK...<br>
BYPASSING FIREWALL...<br>
ACCESS GRANTED...<br><br>

WELCOME TO SAMSOOR CYBER TERMINAL<br>
Owner: Samsoor<br>
Security Level: MAXIMUM<br>
Status: ONLINE
</div>

<audio autoplay loop>
<source src="https://www.soundjay.com/mechanical/keyboard-typing-1.mp3" type="audio/mpeg">
</audio>

<script>
var c=document.getElementById("matrix");
var ctx=c.getContext("2d");

c.height=window.innerHeight;
c.width=window.innerWidth;

var letters="01";
letters=letters.split("");

var font_size=14;
var columns=c.width/font_size;
var drops=[];

for(var x=0;x<columns;x++)
drops[x]=1;

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="#0F0";
ctx.font=font_size+"px monospace";

for(var i=0;i<drops.length;i++){
var text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*font_size,drops[i]*font_size);

if(drops[i]*font_size>c.height&&Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}

setInterval(draw,33);
</script>

</body>
</html>
