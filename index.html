<!DOCTYPE html>
<html>
<head>
<title>Samsoor Cyber Terminal</title>

<style>
body{
margin:0;
background:black;
color:#00ff00;
font-family:monospace;
overflow:hidden;
}

#terminal{
position:absolute;
top:20px;
left:20px;
font-size:20px;
z-index:2;
}

canvas{
position:absolute;
top:0;
left:0;
}
</style>

</head>

<body>

<div id="terminal"></div>

<audio autoplay loop>
<source src="https://www.soundjay.com/mechanical/keyboard-1.mp3">
</audio>

<canvas id="matrix"></canvas>

<script>

var text = "ACCESSING SYSTEM...\nLOADING MODULES...\nWELCOME TO SAMSOOR CYBER NETWORK...";
var i=0;

function type(){
if(i<text.length){
document.getElementById("terminal").innerHTML+=text.charAt(i);
i++;
setTimeout(type,50);
}
}

type();

var c = document.getElementById("matrix");
var ctx = c.getContext("2d");

c.height = window.innerHeight;
c.width = window.innerWidth;

var letters = "010101010101";
letters = letters.split("");

var font_size = 14;
var columns = c.width/font_size;

var drops=[];

for(var x=0;x<columns;x++)
drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="#0F0";
ctx.font=font_size+"px monospace";

for(var i=0;i<drops.length;i++){

var text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*font_size,drops[i]*font_size);

if(drops[i]*font_size>c.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}

setInterval(draw,33);

</script>

</body>
</html>
<audio id="sound" autoplay loop>
<source src="https://www.soundjay.com/mechanical/keyboard-1.mp3" type="audio/mpeg">
</audio>

<script>

let text = [
"Initializing hack module...",
"Scanning global network...",
"Bypassing firewall...",
"Access granted...",
"Welcome to Samsoor Cyber Terminal"
];

let i = 0;
let j = 0;

function type(){
if(i < text.length){
if(j < text[i].length){
document.getElementById("terminal").innerHTML += text[i].charAt(j);
j++;
setTimeout(type,50);
}
else{
document.getElementById("terminal").innerHTML += "<br>";
i++;
j=0;
setTimeout(type,500);
}
}
}

type();

<button onclick="playSound()" style="
position:fixed;
top:20px;
left:20px;
padding:10px;
background:black;
color:lime;
border:1px solid lime;
font-family:monospace;
">
START SOUND
</button>
<script>
function playSound(){
  document.getElementById("sound").play();
}
</script>

<audio id="sound" loop>
<source src="https://www.soundjay.com/button/beep-07.mp3" type="audio/
  mpeg">
</audio>
</html>
